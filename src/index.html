<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
</head>

<body>
  <script src="bundle.js"></script>

  <a-scene 
    landing-page 
    xrextras-loading 
    xrextras-runtime-error
    xrweb="disableWorldTracking: true"
    renderer="colorManagement:true">

    <a-assets>
      <a-asset-item id="model" src="assets/AnimatedBuilding.glb"></a-asset-item>
    </a-assets>

    <a-camera></a-camera>

    <xrextras-named-image-target name="building">
      <a-entity 
        gltf-model="#model"
        animation-mixer="clip: *" 
        scale="1 1 1">
      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

</body>
</html>
