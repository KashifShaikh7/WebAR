<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js"></script>
</head>

<body>
  <script src="bundle.js"></script>

  <a-scene xrweb="disableWorldTracking: true" xrextras-loading>

    <a-assets>
      <a-asset-item id="model" src="assets/AnimatedBuilding.glb"></a-asset-item>
    </a-assets>

    <a-camera></a-camera>

    <xrextras-named-image-target name="building">
      <a-entity 
        gltf-model="#model"
        animation-mixer="clip: *"
        scale="1 1 1">
      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

</body>
</html>
