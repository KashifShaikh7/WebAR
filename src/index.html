<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Estate Projects AR</title>
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  
</head>
<body>
  <script src="bundle.js"></script>
  <a-scene xrextras-gesture-detector landing-page xrextras-loading xrextras-runtime-error
    renderer="colorManagement:true" xrweb="disableWorldTracking: true">

    <a-assets>
      <a-asset-item id="building-glb" src="assets/AnimatedBuilding.glb"></a-asset-item>
      <a-asset-item id="house-glb" src="assets/Building2.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 4 10" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

    <a-light type="ambient" intensity="1"></a-light>

    <!-- Note: "name:" must be set to the name of the image target  -->
    <xrextras-named-image-target name="Building">
      <!-- Add a child entity that can be rotated independently of the image target. -->
      <a-entity xrextras-one-finger-rotate gltf-model="#building-glb" animation-mixer="clip: *"></a-entity>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="target_model2">
      <a-entity xrextras-one-finger-rotate gltf-model="#house-glb" animation-mixer="clip: *"></a-entity>
    </xrextras-named-image-target>

  </a-scene>

</body>

</html>
